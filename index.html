<!DOCTYPE html>
<html>
<head>
  <title>CrisisCoord</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
  <div class="header">
  <img src="./logo.png" class="logo" alt="CrisisCoord Logo">
  <div class="title">
    <h1>CrisisCoord</h1>
    <p>Smart Disaster Response System</p>
  </div>
</div>

<div class="container">

  <!-- DASHBOARD -->
  <div class="dashboard">

    <!-- SYSTEM STATUS -->
    <div class="card status-card">
      <h3>System Status</h3>
      <p id="water"></p>
      <p id="temp"></p>
      <p id="gas"></p>
      <p id="vibration"></p>
      <div id="status" class="status-badge"></div>
    </div>

    <!-- ALERTS PANEL -->
    <div class="card alert-card">
      <h3>Active Alerts</h3>
      <div id="alerts-list">No active alerts</div>
    </div>

  </div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- REPORT INCIDENT -->
  <div class="card form-card">
    <h3>Report an Incident</h3>
    <input type="text" id="place" placeholder="Enter location (e.g. Gachibowli)" />
    <input type="text" id="type" placeholder="Type (Flood/Gas/etc)" />
    <button onclick="submitAlert()">Submit Alert</button>
  </div>

</div>

  <script src="script.js?v=7"></script>

</body>
</html>
