<!DOCTYPE html>
<html>
<head>
  <title>CrisisCoord</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>

  <h1>🚨 CrisisCoord</h1>
  <h3>Smart Disaster Monitoring System</h3>

 <div class="card">
  <h2 id="water">Water Level: --</h2>
  <h2 id="temp">Temperature: --</h2>
  <h2 id="gas">Gas Level: --</h2>
  <h2 id="vibration">Vibration: --</h2>
  <h2 id="status">Loading...</h2>
</div>
  <div id="map"></div>
<h3>🚨 Report an Incident</h3>

<div class="card">
  <input type="text" id="lat" placeholder="Latitude" />
  <input type="text" id="lng" placeholder="Longitude" />
  <input type="text" id="type" placeholder="Type (Flood/Gas/etc)" />
  <button onclick="submitAlert()">Submit Alert</button>
</div>
  <script src="script.js?v=4"></script>

</body>
</html>
